<!doctype html>
<html lang="zh-cn">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Agent OS</title>
    <style>
      @keyframes lds-dot-bounce {
        0%, 80%, 100% {
          transform: scale(0);
          opacity: 0.4;
        }
        40% {
          transform: scale(1);
          opacity: 1;
        }
      }
      @keyframes lds-logo-float {
        0%, 100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }
      #loading-screen {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f8fafc;
        z-index: 99999;
        transition: opacity 0.3s ease;
      }
      #loading-screen .lds-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }
      #loading-screen .lds-logo {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 16px rgba(59, 130, 246, 0.15);
        animation: lds-logo-float 2s ease-in-out infinite;
      }
      #loading-screen .lds-logo img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      #loading-screen .lds-title {
        font-size: 20px;
        font-weight: 700;
        color: #0f172a;
        letter-spacing: -0.01em;
      }
      #loading-screen .lds-dots {
        display: flex;
        gap: 8px;
      }
      #loading-screen .lds-dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #3b82f6;
        animation: lds-dot-bounce 1.4s ease-in-out infinite both;
      }
      #loading-screen .lds-dots span:nth-child(1) {
        animation-delay: -0.32s;
      }
      #loading-screen .lds-dots span:nth-child(2) {
        animation-delay: -0.16s;
      }
      #loading-screen .lds-dots span:nth-child(3) {
        animation-delay: 0s;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="loading-screen">
        <div class="lds-wrapper">
          <div class="lds-logo">
            <img src="/logo.ico" alt="logo" />
          </div>
          <div class="lds-title">AI Agent OS</div>
          <div class="lds-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>
    </div>
    <noscript>
      <div style="max-width:800px;margin:40px auto;padding:20px;font-family:sans-serif;line-height:1.6;">
        <h1>AI Agent 智能体平台</h1>
        <p>AI 智能体构建与运行平台，支持可视化编排、多模型接入和 MCP 工具集成。</p>
        <p>本站需要启用 JavaScript 才能正常运行，请检查浏览器设置。</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
